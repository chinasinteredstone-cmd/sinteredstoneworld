const l1Names = { slab:'奢石大板', furniture:'成品家具', accessory:'配件脚架', case:'落地案例' };

const cats = [...new Set(PRODUCTS.map(p=>p.cat))].sort();
const catSel = document.getElementById('filterCat');
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o);});

const grid=document.getElementById('grid');
PRODUCTS.forEach(p=>{
  const imgs=p.imgs;
  const tag=`<span class="tag tag-${p.l1}">${l1Names[p.l1]||p.l1}</span>`;
  const card=document.createElement('div');
  card.className='card';
  card.dataset.l1=p.l1;
  card.dataset.cat=p.cat;
  card.dataset.search=(p.title+' '+p.titleEn+' '+p.id+' '+p.xhsTitle).toLowerCase();
  card.onclick=()=>showProduct(p);
  card.innerHTML=`
    <div class="cover-wrap">
      <img src="${p.id}/cover.jpg" alt="${p.title}" loading="lazy">
      <div class="img-count">${imgs.length}张</div>
    </div>
    <div class="card-info">
      <div class="card-title">${p.xhsTitle}</div>
      <div class="card-meta">${tag} ${p.cat} · ${p.size.replace(/×/g,'x')}</div>
    </div>`;
  grid.appendChild(card);
});

function applyFilter(){
  const l1=document.getElementById('filterL1').value;
  const cat=document.getElementById('filterCat').value;
  const q=document.getElementById('searchBox').value.toLowerCase();
  let shown=0;
  document.querySelectorAll('.card').forEach(c=>{
    const okL1=!l1||c.dataset.l1===l1;
    const okCat=!cat||c.dataset.cat===cat;
    const okQ=!q||c.dataset.search.includes(q);
    if(okL1&&okCat&&okQ){c.classList.remove('hidden');shown++;}
    else c.classList.add('hidden');
  });
  document.getElementById('stats').textContent=`${shown} / ${PRODUCTS.length}`;
}
applyFilter();

function showProduct(p){
  const mc=document.getElementById('modalContent');
  mc.innerHTML=p.imgs.map(i=>`<img src="${p.id}/${i}" alt="">`).join('');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
</script>
