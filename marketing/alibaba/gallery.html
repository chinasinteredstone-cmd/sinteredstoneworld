// 收集所有品类
const cats = [...new Set(PRODUCTS.map(p=>p.cat))].sort();
const catSel = document.getElementById('filterCat');
cats.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });

const l1Names = { slab:'奢石大板', furniture:'成品家具', accessory:'配件脚架', case:'落地案例' };

// 渲染
const grid = document.getElementById('grid');
PRODUCTS.forEach(p => {
  const imgs = p.imgs.map(i => `<img src="main-images/${i}" alt="${p.title}" loading="lazy" onclick="showDetail('${p.id}')">`).join('');
  const tag = `<span class="tag tag-${p.l1}">${l1Names[p.l1]||p.l1}</span>`;
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.l1 = p.l1;
  card.dataset.cat = p.cat;
  card.dataset.title = (p.title+' '+p.titleEn+' '+p.id).toLowerCase();
  card.innerHTML = `
    <div class="card-head">
      <div class="card-id">ID: ${p.id}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-cat">${tag} ${p.cat} · ${p.size.replace(/×/g,'x')}</div>
    </div>
    <div class="card-imgs">${imgs}</div>
    <div class="card-actions">
      <a class="btn" href="detail-pages/${p.id}_detail.jpg" target="_blank">📄 查看详情页</a>
    </div>
  `;
  grid.appendChild(card);
});

function applyFilter() {
  const l1 = document.getElementById('filterL1').value;
  const cat = document.getElementById('filterCat').value;
  const q = document.getElementById('searchBox').value.toLowerCase();
  let shown = 0;
  document.querySelectorAll('.card').forEach(c => {
    const okL1 = !l1 || c.dataset.l1 === l1;
    const okCat = !cat || c.dataset.cat === cat;
    const okQ = !q || c.dataset.title.includes(q);
    if (okL1 && okCat && okQ) { c.classList.remove('hidden'); shown++; }
    else c.classList.add('hidden');
  });
  document.getElementById('stats').textContent = `显示 ${shown} / ${PRODUCTS.length}`;
}
applyFilter();

function showDetail(id) {
  window.open('detail-pages/'+id+'_detail.jpg', '_blank');
}
